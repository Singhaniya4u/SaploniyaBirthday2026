<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Saploniya!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght=700&family=Poppins:wght=300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="balloon-container"></div>

    <div class="container">
        <header class="hero">
            <h1>Happy Birthday, <br><span class="highlight">Saploniya!</span></h1>
            <p class="subtitle">Wishing the amazing Sapna Saloni a day as beautiful as she is.</p>
        </header>

        <div style="width: 100%; height: 120px; background: transparent; pointer-events: none;"></div>

        <section class="message-card glass">
            <p>
                May this year bring you endless joy, success, and all the beautiful moments you deserve. 
                Keep shining and smiling! Have the best birthday ever! 🎂✨
            </p>
        </section>

        <section class="gallery">
            <div class="photo-frame glass">
                <img src="shared image (1).jpg" alt="Sapna Photo 1">
            </div>
            <div class="photo-frame glass">
                <img src="Center.jpg" alt="Sapna Photo 2">
            </div>
            <div class="photo-frame glass">
                <img src="shared image (3).jpg" alt="Sapna Photo 3">
            </div>
        </section>

        <div class="action-section">
            <button id="surpriseBtn" class="btn">Click for a Surprise! 🎉</button>
        </div>
        <div style="width: 100%; height: 120px; background: transparent; pointer-events: none;"></div>
    </div>

    <div class="hint-bar glass">
        <span>✨ Balloon ko touch kar na Baakli...🎈</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
